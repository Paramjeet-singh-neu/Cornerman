name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Smoke tests
        run: pytest -q tests/
      - name: Structural eval — verify thesis holds
        # Runs the offline comparison between feedback-architecture and
        # answer-machine outputs. Fails CI if a prompt edit ever weakens
        # the contrast that IS the product.
        run: python -m eval.compare
